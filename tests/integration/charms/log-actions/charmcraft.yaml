type: charm
name: log-actions
title: Log Actions Test Charm
summary: A test charm with log actions for use in integration tests.
description: What it says on the tin.

# https://documentation.ubuntu.com/charmcraft/stable/howto/build-guides/select-platforms/
base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

actions:
  log:
    description: Make a lot of logging calls.
    additionalProperties: false
    params:
      fail:
        description: "Whether to fail the action after making the logging calls."
        type: boolean
        default: false
